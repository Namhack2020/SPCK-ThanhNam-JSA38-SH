<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="../static/css/login.css" />
  </head>
  <body>
    <div class="container">
      <div class="logo">
        <img src="../static/image/logo.png" alt="Thế giới công nghệ" />
        <h1>Thế giới công nghệ</h1>
      </div>

      <h2>Đăng nhập</h2>

      <form>
        <input id="username" name="name" placeholder="Tên" required />
        <input id="email" name="email" placeholder="Email" type="email" required />
        <input id="password" name="password" placeholder="Mật khẩu" type="password" required />

        <button type="submit" onclick="login(event)">Đăng nhập</button>
      </form>
      <a href="signup.html">Chưa có tài khoản? Đăng kí</a>
    </div>
    
    <script src="../static/js/login.js"></script>
  </body>
</html>
